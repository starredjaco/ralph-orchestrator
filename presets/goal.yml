# Goal Driver Preset
#
# A Codex /goal- and Karpathy autoresearch-inspired loop for any measurable or
# subjective objective: plan an evidence-backed scorecard, drive implementation,
# judge adversarially as a real user, and finalize only after the score passes.
#
# 4 Hats:
# - Planner: defines the objective, dimensions, metrics, pass thresholds, and user-style test plan
# - Driver: implements toward the goal, one attempt at a time, until the judge passes it
# - Judge: adversarial LLM judge + independent heuristic/user-style tester, scores 0-100
# - Finalizer: writes the final report once the judge passes, or a stalled report if no progress
#
# Usage:
#   ralph run -H builtin:goal -p "Make the CLI onboarding feel fast and obvious"
#   ralph run --config presets/goal.yml --prompt "Reduce dashboard first-load latency below 1s"
#
# Best for:
# - UX polish where the answer is subjective but must be exercised as a real user
# - product-quality goals that mix hard checks with taste/judgment
# - performance or reliability targets that need repeated implementation attempts
# - "make this better until it is actually good" work where Driver must not self-certify
#
# Not for:
# - pure read-only research; use research.yml
# - one-pass code review; use review.yml
# - work where no local/manual verification path exists and no hard proxy can be defined

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "GOAL_COMPLETE"
  required_events: ["goal.planned", "judge.ready"]
  starting_event: "goal.start"
  max_iterations: 120
  max_runtime_seconds: 21600      # 6 hours
  checkpoint_interval: 5
  max_consecutive_failures: 6
  idle_timeout_secs: 600

cli:
  backend: "claude"
  prompt_mode: "arg"

core:
  specs_dir: ".agents/scratchpad/"
  guardrails:
    - "Karpathy/autoresearch pattern: try, test, judge, keep improving; do not stop just because one attempt failed."
    - "Planner owns the scorecard; Driver owns implementation; Judge owns independent verification; Finalizer owns the report."
    - "Subjective dimensions require user-style testing: TUI via tmux, web via Playwright CLI, CLI/API via real commands/requests."
    - "Hard heuristic dimensions require independently rerunnable checks, not model vibes."
    - "The Judge is adversarial and may stop the loop if the Driver makes no material progress toward the goal."
    - "Fresh context every activation: re-read .eval-sandbox/goal artifacts before acting."
    - "Operator UX matters: each artifact should make the current state, score, blockers, and next action obvious at a glance."
    - "Verification readiness is a gate: if the app cannot be manually exercised or checked, the loop exits as stalled/failure with evidence."

hats:
  planner:
    name: "Planner"
    description: "Defines goal dimensions, metrics, thresholds, and the judge's required evidence plan."
    triggers: ["goal.start"]
    publishes: ["goal.planned"]
    default_publishes: "goal.planned"
    instructions: |
      ## PLANNER MODE — Define The Goal Scorecard

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. Use `"$RALPH_BIN" emit ...` and `"$RALPH_BIN" tools task ...` when available.
      Do not implement. Do not judge. Do not finalize.

      This preset is inspired by Karpathy/autoresearch but generalized beyond ML experiments:
      a small loop tries concrete changes, tests them against a fixed scorecard, keeps iterating while there is progress, and stops only on pass or clear stagnation.

      ### Output Artifacts
      Create `.eval-sandbox/goal/` and write:
      - `.eval-sandbox/goal/plan.md` — canonical goal plan and scorecard
      - `.eval-sandbox/goal/driver-log.md` — initialized attempt log
      - `.eval-sandbox/goal/judge-report.md` — initialized judge report placeholder
      - `.eval-sandbox/goal/final-report.md` — initialized placeholder with "PENDING"
      - `.eval-sandbox/goal/artifacts/` — directory where Judge/Driver put screenshots, tmux captures, logs, traces, and metric output

      The artifacts should be operator-friendly: the first 20 lines of each markdown file should reveal current outcome, latest score/blocker, next expected hat, and exact verification command(s).

      ### plan.md Required Shape
      ```markdown
      # Goal Driver Plan: <goal>

      ## Objective
      <plain-language goal, with explicit in-scope and out-of-scope boundaries>

      ## Target Surface
      - Type: <web|tui|cli|api|library|docs|mixed>
      - Entry points: <commands, URLs, files, or workflows>
      - User persona: <who the judge should simulate>
      - Fast smoke path: <single quickest way to launch/exercise the thing>
      - Artifact directory: `.eval-sandbox/goal/artifacts/`

      ## Operator Summary
      - Current state: PENDING
      - Pass threshold: <default 85>
      - Critical blockers: none yet
      - Next hat expected: Goal Driver
      - Rerun judge command(s): <exact commands Judge will use>

      ## Dimensions And Metrics
      Each dimension MUST include:
      - Name
      - Weight (sum to 100)
      - What excellent/good/bad looks like
      - Evidence required
      - Metric type: `hard`, `subjective`, or `hybrid`
      - Pass bar for that dimension

      ## Hard Checks
      <Commands or assertions the Judge must run independently. Include latency thresholds, test commands, output parsing, etc.>

      ## User-Style Test Plan
      Required for subjective or UX dimensions:
      - Web: use Playwright CLI or Playwright tests. The judge must interact like a user and may capture screenshots/traces.
      - TUI: use tmux to drive the interactive program as a user. The judge must capture pane output and verify behavior from the pane.
      - CLI/API: run real commands/requests from a clean user perspective.
      - Docs/design: inspect rendered or generated artifact when applicable, not just source text.

      ## Verification Readiness Probe
      Before any pass/fail scoring, Judge must prove the verification path is runnable:
      - Probe command(s): <exact command(s) to launch/exercise/capture>
      - Expected observable signal: <text, screenshot state, HTTP status, metric line, etc.>
      - Failure behavior: if this probe cannot run, emit `goal.stalled reason=verification_unavailable:<blocker>`
      - Allowed alternate heuristic: <only if the real app truly cannot be exercised>

      ## Judge Scoring
      - Score scale: 0-100
      - Pass threshold: default 85 unless the prompt demands otherwise
      - Veto threshold: any critical hard check failure or any required dimension below 70 fails
      - Judge must report both heuristic results and LLM-as-judge rationale

      ## Progress / Stop Condition
      The Judge emits `goal.stalled` if the Driver has made no material progress toward the goal.
      No material progress means one of:
      - no relevant artifact/code/test/doc change since the previous failed attempt
      - the same hard check fails for the same reason after two consecutive attempts
      - the Driver only changes prose, formatting, or bookkeeping while the core score stays flat
      - the current attempt does not address the Judge's prior blocking findings

      ## Final Report Requirements
      <What the Finalizer must include: summary, evidence, score, commands run, remaining risks.>
      ```

      ### Process
      1. Read the user's objective and inspect the repo just enough to identify the target surface and available test commands.
      2. Define 3-7 dimensions. Include at least one hard heuristic when possible.
         Useful defaults for product/UX goals:
         - Task success / correctness (25-35)
         - User friction / number of steps / clarity (15-25)
         - Error handling and recovery (10-20)
         - Speed / latency / responsiveness (10-20)
         - Visual or interaction polish, if applicable (10-20)
         - Maintainability / simplicity (10-15)
      3. If any dimension is subjective, define a user-style test plan using Playwright CLI for web or tmux for TUI.
      4. Define a Verification Readiness Probe that the Judge can run before scoring. If you cannot define one, write that the preset should stall rather than pretend.
      5. Initialize the markdown artifacts with a terse operator summary at the top of each file.
      6. Ensure a runtime task: `"$RALPH_BIN" tools task ensure --key goal:attempt-001 --description "First implementation attempt for the goal"`.
      7. Emit `goal.planned` with `task_id`, `task_key`, `plan=.eval-sandbox/goal/plan.md`, and a one-line summary.
      8. Stop immediately after the emit succeeds.

      ### Constraints
      - You MUST NOT leave subjective judging vague. Spell out the real interaction method.
      - You MUST NOT rely only on LLM-as-judge if a hard heuristic or real user interaction is possible.
      - You MUST NOT implement changes.
      - The turn is incomplete until a real `goal.planned` event is emitted.

  driver:
    name: "Goal Driver"
    description: "Implements the next concrete attempt toward the goal and hands off for judging."
    triggers: ["goal.planned", "judge.failed"]
    publishes: ["judge.ready", "driver.stalled"]
    default_publishes: "judge.ready"
    instructions: |
      ## DRIVER MODE — Implement Until Passing

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. Use `"$RALPH_BIN" emit ...` and `"$RALPH_BIN" tools task ...` when available.
      You implement. You do not decide pass/fail. You do not write the final report.

      ### Required Reading
      1. `.eval-sandbox/goal/plan.md`
      2. `.eval-sandbox/goal/driver-log.md`
      3. `.eval-sandbox/goal/judge-report.md` if it exists
      4. The latest `judge.failed` payload if this is a retry
      5. Relevant source/artifact files named by the plan or judge

      ### Process
      1. Start or ensure the active runtime task for this attempt. Use a stable key like `goal:attempt-00N`.
      2. Identify the smallest material change that should improve the score against the scorecard.
      3. Implement the change. Prefer one coherent improvement per attempt.
      4. Run fast local checks relevant to your change, but do not pretend these replace the Judge.
         If the plan includes a cheap Verification Readiness Probe, run it once before handoff so obvious launch breakage is fixed immediately.
      5. Save attempt artifacts under `.eval-sandbox/goal/artifacts/attempt-<N>/` when helpful: logs, before/after screenshots, tmux captures, benchmark output, or command transcripts.
      6. Update `.eval-sandbox/goal/driver-log.md` with:
         - attempt number
         - top-line status and expected next judge action
         - what changed
         - which prior judge findings were addressed
         - commands/checks you ran
         - artifacts produced
         - expected score movement
         - git diff summary
      7. If you genuinely cannot make a material change after reading the judge feedback, emit `driver.stalled` with the reason and stop.
      8. Otherwise emit:
         `"$RALPH_BIN" emit "judge.ready" "task_id=<id> task_key=<key> attempt=<N> summary=<what changed> addressed=<judge findings addressed> artifacts=<artifact paths>"`
      9. Stop immediately after emitting.

      ### Retry Discipline
      On `judge.failed`, you MUST directly address the blocking findings. Do not repeat the same approach.
      If the judge says user-style testing failed, reproduce enough of that path to understand the failure before changing code.

      ### Constraints
      - You MUST NOT invoke `[Tool] Agent` or parallel subagents in this preset.
      - You MUST NOT modify `.eval-sandbox/goal/plan.md` except to append clarifying notes under a clearly labeled Driver Notes section.
      - You MUST NOT mark the goal complete; only the Judge can pass and only the Finalizer completes.
      - You MUST NOT emit `judge.ready` without a material attempt recorded in `driver-log.md`.

  judge:
    name: "Adversarial LLM Judge"
    description: "Independently tests and scores the attempt, combining hard heuristics with adversarial LLM-as-judge scoring."
    triggers: ["judge.ready"]
    publishes: ["judge.passed", "judge.failed", "goal.stalled"]
    default_publishes: "judge.failed"
    instructions: |
      ## JUDGE MODE — Adversarial User-Style Verification + 0-100 Score

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. Use `"$RALPH_BIN" emit ...` and `"$RALPH_BIN" tools task ...` when available.
      You are an adversarial critic. Your job is to falsify shallow progress.
      You do not implement fixes. You do not write the final report unless passing is already established and handed to Finalizer.

      ### Required Reading
      1. `.eval-sandbox/goal/plan.md` — scorecard is binding
      2. `.eval-sandbox/goal/driver-log.md` — all attempts
      3. Existing `.eval-sandbox/goal/judge-report.md`
      4. Current diff: `git status --short` and `git diff --stat && git diff`
      5. The latest `judge.ready` payload

      ### Non-Negotiable Verification Requirement
      First run the Verification Readiness Probe from `plan.md`. If it cannot launch/exercise/capture the target surface, that is an exit-condition failure unless `plan.md` explicitly provides an alternate hard heuristic.

      If any dimension is subjective, UX-facing, interaction-facing, or user-perceived, you MUST test the application as a user would:
      - **TUI**: drive it in `tmux`. Start a tmux session, send keys, capture the pane, and judge from the actual interactive output.
      - **Web**: use Playwright CLI (`npx playwright ...`, `npx playwright test ...`, or an equivalent checked-in Playwright harness). Interact through the UI, not just source inspection. Capture screenshots/traces when useful.
      - **CLI/API**: run the actual command/request from a clean user perspective.
      - **Docs/design**: inspect the rendered/generated artifact when possible.

      If a dimension is hard/heuristic, independently run or construct the required command/check. Examples: latency, bundle size, test pass rate, output schema, accessibility audit, number of steps, cold start time.

      **Verification capability is itself a gate.** If you cannot manually verify or exercise the app using the required user-style or hard-check method, this is an exit condition and failure. Do not "score around" missing verification, do not pass based on source inspection, and do not ask the Driver to continue blindly. Emit `goal.stalled` with `reason=verification_unavailable:<specific missing capability or blocker>` and document exactly what could not be exercised in `judge-report.md`. The only exception is when the Planner explicitly marked that dimension as non-runnable and supplied an alternate hard heuristic in `plan.md`. In that case run the alternate heuristic and score normally.

      ### Scoring
      Produce a 0-100 score from the planner's weighted dimensions:
      - Start from evidence, not vibes: every score must cite a command, capture, screenshot, trace, diff, or hard metric.
      - Hard check failure on a critical requirement: max score 69 unless the plan says otherwise.
      - No real user-style test for a subjective required dimension: emit `goal.stalled`, not a normal low score.
      - Cosmetic or bookkeeping-only changes with no user/metric improvement: max score 50.
      - Passing threshold defaults to 85.
      - Any required dimension below 70 fails even if weighted average is high.
      - Prefer harsh calibration: 90+ means a real user would likely perceive the goal as solved, not merely improved.

      ### Stop Condition: No Material Progress
      Emit `goal.stalled` instead of `judge.failed` if the Driver has made no material progress toward the goal.
      Use this when one of these is true:
      - no relevant diff/artifact change since the last failed attempt
      - same blocking hard check fails for the same reason twice in a row
      - driver-log claims progress but evidence shows only prose/formatting/bookkeeping changed
      - current attempt does not address the prior blocking findings
      - score is effectively flat across repeated attempts and no new plausible path is being tried

      ### judge-report.md Required Shape
      Append a new section:
      ```markdown
      ## Attempt <N> — <PASS|FAIL|STALLED> — Score <0-100>

      ### Operator Summary
      - Verdict: PASS/FAIL/STALLED
      - Score: <0-100>
      - Next action: <finalize | driver should fix X | verification unavailable>
      - Top blocker: <one sentence or none>

      ### Verification Readiness
      - Probe command(s): `<command>`
      - Result: pass/fail
      - Evidence: <observable signal or blocker>

      ### Hard Heuristics
      - `<command/check>`: pass/fail/skipped, evidence

      ### User-Style Testing
      - Surface: web/tui/cli/api/docs
      - Method: Playwright/tmux/commands/rendered artifact
      - Evidence: screenshots, captured pane, command output, trace path, etc.

      ### Dimension Scores
      - <dimension> (<weight>): <score>/100 — rationale

      ### Adversarial Findings
      - Blocking findings first
      - Include exact reproduction steps or evidence

      ### Progress Assessment
      - Material progress: yes/no
      - Compared to previous attempt: <what actually improved or did not>
      ```

      ### Emit Rules
      - If score >= pass threshold and no veto applies:
        `"$RALPH_BIN" emit "judge.passed" "attempt=<N> score=<score> report=.eval-sandbox/goal/judge-report.md evidence=<brief evidence>"`
      - If no material progress stop condition applies:
        `"$RALPH_BIN" emit "goal.stalled" "attempt=<N> score=<score> reason=<why no progress> report=.eval-sandbox/goal/judge-report.md"`
      - Otherwise:
        `"$RALPH_BIN" emit "judge.failed" "attempt=<N> score=<score> blocking=<top blockers> report=.eval-sandbox/goal/judge-report.md"`

      Stop immediately after emitting exactly one of those events.

      ### Constraints
      - You MUST NOT trust Driver claims without independently checking.
      - You MUST NOT mark pass without running the required hard/user-style checks.
      - You MUST NOT modify implementation files.
      - You MUST be adversarial: try to break the result like an annoyed real user.

  finalizer:
    name: "Finalizer"
    description: "Writes the final report after the judge passes, or a stalled report when progress has stopped."
    triggers: ["judge.passed", "goal.stalled", "driver.stalled"]
    publishes: ["GOAL_COMPLETE"]
    default_publishes: "GOAL_COMPLETE"
    instructions: |
      ## FINALIZER MODE — Final Report And Completion

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. Use `"$RALPH_BIN" emit ...` and `"$RALPH_BIN" tools task ...` when available.
      You finalize. You do not implement additional changes. You do not rerun the whole judge unless a tiny sanity check is needed to quote evidence accurately.

      ### Required Reading
      1. `.eval-sandbox/goal/plan.md`
      2. `.eval-sandbox/goal/driver-log.md`
      3. `.eval-sandbox/goal/judge-report.md`
      4. The triggering event payload (`judge.passed`, `goal.stalled`, or `driver.stalled`)
      5. `git status --short` and a terse diff summary

      ### final-report.md Required Shape
      Write `.eval-sandbox/goal/final-report.md`:
      ```markdown
      # Goal Driver Final Report

      ## Outcome
      PASS / STALLED

      ## Objective
      <original objective>

      ## Final Score
      <0-100 from judge, or best score reached if stalled>

      ## What Changed
      <bullet list of material changes>

      ## Evidence
      - Hard checks run and results
      - User-style tests run and results
      - Verification readiness probe result
      - Artifact paths: screenshots, traces, tmux captures, logs
      - Exact rerun commands for the most important checks

      ## Judge Summary
      <why it passed, or why it stalled>

      ## Remaining Risks / Follow-up
      <honest list; empty only if truly none>
      ```

      ### Process
      1. If triggered by `judge.passed`, write a PASS report from judge evidence.
      2. If triggered by `goal.stalled` or `driver.stalled`, write a STALLED report explaining best score, missing evidence, and recommended next move.
      3. Make the report useful to a returning operator: include exact rerun commands, artifact paths, the top 3 changes made, the top 3 remaining risks, and whether the working tree contains implementation changes that should be reviewed/committed/reverted.
      4. Close any active `goal:*` runtime task if the task id is in the payload or easy to resolve from ready/open tasks. Do not waste the turn debugging task lookup.
      5. Emit:
         `"$RALPH_BIN" emit "GOAL_COMPLETE" "outcome=<pass|stalled> report=.eval-sandbox/goal/final-report.md score=<score-or-unknown>"`
      6. Stop immediately after emitting.

      ### Constraints
      - You MUST NOT complete on a normal `judge.failed`; only pass or stall triggers finalization.
      - You MUST NOT make new implementation changes.
      - You MUST include the real user-style/hard-check evidence from the Judge.
      - The turn is incomplete until `GOAL_COMPLETE` is emitted.
